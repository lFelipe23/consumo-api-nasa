<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Galeria de Fenômenos Astronômicos | NASA</title>
  <meta name="description" content="Galeria de eclipses, fases da lua e conjunções usando a NASA Image and Video Library." />
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body {
      background:
        radial-gradient(ellipse at top, #1a1a3a 0%, #0a0a1f 50%, #000 100%);
      min-height: 100vh;
    }
    .star-bg::before {
      content: "";
      position: fixed;
      inset: 0;
      background-image:
        radial-gradient(2px 2px at 20% 30%, #fff, transparent),
        radial-gradient(1px 1px at 60% 70%, #fff, transparent),
        radial-gradient(1px 1px at 80% 10%, #fff, transparent),
        radial-gradient(2px 2px at 40% 80%, #fff, transparent),
        radial-gradient(1px 1px at 90% 50%, #fff, transparent);
      opacity: 0.4;
      pointer-events: none;
      z-index: 0;
    }
  </style>
</head>
<body class="star-bg text-slate-100">
  <div class="relative z-10">
    <header class="border-b border-slate-800/60 backdrop-blur-sm">
      <div class="max-w-6xl mx-auto px-6 py-8 text-center">
        <h1 class="text-3xl md:text-5xl font-bold tracking-tight bg-gradient-to-r from-indigo-300 via-purple-300 to-pink-300 bg-clip-text text-transparent">
          Galeria de Fenômenos Astronômicos
        </h1>
        <p class="mt-3 text-slate-400 text-sm md:text-base">
          Eclipses, fases da lua e conjunções — direto da NASA Image and Video Library
        </p>
      </div>
    </header>
    <main class="max-w-6xl mx-auto px-6 py-10">
      <div id="galeria" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
        <p id="status" class="col-span-full text-center text-slate-400">Carregando imagens...</p>
      </div>
    </main>
    <footer class="text-center text-slate-500 text-xs py-8">
      Dados: NASA Image and Video Library — images-api.nasa.gov
    </footer>
  </div>
  <script src="script.js"></script>
</body>
</html>
